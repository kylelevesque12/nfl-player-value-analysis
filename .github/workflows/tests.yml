name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        # The data-independent tests and the byte-compile step only need the core
        # scientific stack and pytest. The full requirements.txt (Streamlit, MLflow,
        # SHAP, Optuna, Polars, nflreadpy, ...) drives the pipeline/app and is
        # intentionally not installed here, to keep CI fast and reliable.
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest

      - name: Byte-compile all source (catches syntax/import-structure errors)
        run: python -m compileall -q src app scripts

      - name: Run data-independent test suite
        # The raw nflverse data under data/raw/ is intentionally not committed
        # (large, regenerable), so the data-backed tests can't run on a clean
        # checkout. These suites cover the pure helpers/config and run anywhere:
        # landing + detail-page content, player search/index/assembly, and the
        # synthetic PBP leakage-safety checks.
        run: |
          pytest -q \
            tests/test_landing_content.py \
            tests/test_page_content.py \
            tests/test_player_search.py \
            tests/test_section_content.py \
            tests/test_layout.py \
            tests/test_pbp_features.py
